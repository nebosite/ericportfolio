server {
    listen 443 ssl;
    server_name ericjorgensen.com www.ericjorgensen.com;

    ssl_certificate     /etc/letsencrypt/live/ericjorgensen.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ericjorgensen.com/privkey.pem;

    root /var/www/portfolio/apps/ericjorgensen/client/dist;
    index index.html;

    # React SPA — serve index.html for all non-asset routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Remote MCP endpoint (feature-request insights) → insights service on 3006.
    # Bearer-gated in the app. Streaming-friendly: no buffering, long read
    # timeout, and the mcp-session-id header passes through by default.
    location /mcp {
        proxy_pass http://localhost:3006;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # Public, read-only Coding Mentor MCP → mentor service on 3007 (no auth).
    location /coach {
        proxy_pass http://localhost:3007;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # The public feedback panel (e.g. Singadoodle) talks to the shared feedback
    # service on 3005; longest-prefix match wins over the per-app /api/ below.
    location /api/feedback {
        proxy_pass http://localhost:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # The secret feedback admin console (/manage/feedback) talks to the shared
    # feedback service's admin API (longest-prefix match wins over /api/).
    location /api/admin/ {
        proxy_pass http://localhost:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy API to Express
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

server {
    listen 80;
    server_name ericjorgensen.com www.ericjorgensen.com;
    return 301 https://$host$request_uri;
}
