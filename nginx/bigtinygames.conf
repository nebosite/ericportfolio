server {
    listen 443 ssl;
    server_name bigtinygames.com www.bigtinygames.com;

    ssl_certificate     /etc/letsencrypt/live/bigtinygames.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bigtinygames.com/privkey.pem;

    root /var/www/portfolio/apps/bigtinygames/client/dist;
    index index.html;

    # React SPA — serve index.html for all non-asset routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Feedback goes to the shared feedback service (longest-prefix match wins).
    location /api/feedback {
        proxy_pass http://localhost:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy API to Express
    location /api/ {
        proxy_pass http://localhost:3004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

server {
    listen 80;
    server_name bigtinygames.com www.bigtinygames.com;
    return 301 https://$host$request_uri;
}
