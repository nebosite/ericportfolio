server {
    listen 443 ssl;
    server_name pixelwhimsy.com www.pixelwhimsy.com;

    ssl_certificate     /etc/letsencrypt/live/pixelwhimsy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pixelwhimsy.com/privkey.pem;

    root /var/www/portfolio/apps/pixelwhimsy/client/dist;
    index index.html;

    # React SPA — serve index.html for all non-asset routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to Express
    location /api/ {
        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

server {
    listen 80;
    server_name pixelwhimsy.com www.pixelwhimsy.com;
    return 301 https://$host$request_uri;
}
